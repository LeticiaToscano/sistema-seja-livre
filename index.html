    --bg:#0A0D0C;--bg-2:#0E1311;--surface:#131A17;--surface-2:#182119;
    --border:rgba(255,255,255,.07);--border-strong:rgba(255,255,255,.13);
    --text:#EAF0EC;--text-dim:#93A29A;--text-faint:#5E6E66;
    --green:#2EE59D;--green-deep:#0F3D2E;--amber:#F5B841;--amber-deep:#3A2E10;
    --red:#F65C6E;--red-deep:#3A1620;--blue:#4C86C6;--teal:#2FB5A8;--purple:#9B8CFF;
    --radius:14px;--radius-sm:10px;--font:'Sora',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--font);background:
      radial-gradient(1200px 600px at 100% -10%,rgba(46,229,157,.06),transparent 60%),var(--bg);
    color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  .hidden{display:none!important}

  /* ---------- LOGIN ---------- */
  #login{min-height:100vh;display:grid;place-items:center;padding:24px}
  .login-card{width:100%;max-width:380px;background:var(--surface);border:1px solid var(--border);
    border-radius:18px;padding:34px 30px}
  .brand-lg{display:flex;align-items:center;gap:12px;margin-bottom:26px}
  .mark{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#2EE59D,#12b877);
    display:grid;place-items:center}
  .brand-lg .n{font-size:17px;font-weight:800;letter-spacing:-.4px}
  .brand-lg .s{font-size:10px;color:var(--green);letter-spacing:2px;font-weight:700}
  .login-card h1{font-size:16px;font-weight:700;margin-bottom:4px}
  .login-card p{font-size:12.5px;color:var(--text-dim);margin-bottom:22px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:11px;color:var(--text-dim);font-weight:600;margin-bottom:6px}
  .field input{width:100%;background:var(--bg);border:1px solid var(--border-strong);border-radius:10px;
    padding:11px 13px;color:var(--text);font-size:14px;font-family:inherit}
  .field input:focus{outline:none;border-color:var(--green)}
  .btn-primary{width:100%;background:var(--green);color:#04140d;border:none;border-radius:10px;
    padding:12px;font-size:14px;font-weight:700;margin-top:8px}
  .btn-primary:disabled{opacity:.6}
  .login-err{color:var(--red);font-size:12.5px;margin-top:12px;min-height:16px}

  /* ---------- APP SHELL ---------- */
  #app{display:grid;grid-template-columns:210px 1fr;min-height:100vh}
  .sidebar{background:var(--bg-2);border-right:1px solid var(--border);padding:20px 14px;display:flex;flex-direction:column}
  .brand{display:flex;align-items:center;gap:10px;padding:4px 8px 20px}
  .brand .n{font-size:14px;font-weight:800}
  .brand .s{font-size:9px;color:var(--green);letter-spacing:1.5px;font-weight:700}
  .nav{display:flex;flex-direction:column;gap:2px;flex:1;overflow-y:auto}
  .nav-label{font-size:9.5px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-faint);
    font-weight:700;padding:14px 11px 5px}
  .nav-label:first-child{padding-top:2px}
  .nav-item{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:10px;background:none;
    border:none;color:var(--text-dim);font-size:13.5px;font-weight:600;text-align:left;width:100%}
  .nav-item svg{width:18px;height:18px}
  .nav-item:hover{background:var(--surface);color:var(--text)}
  .nav-item.active{background:var(--green-deep);color:var(--green)}
  .foot{border-top:1px solid var(--border);padding-top:12px;margin-top:12px}
  .user-chip{display:flex;align-items:center;gap:10px;padding:6px 8px}
  .avatar{width:32px;height:32px;border-radius:9px;background:var(--surface-2);display:grid;place-items:center;
    font-size:12px;font-weight:700;color:var(--green)}
  .user-chip .u-name{font-size:12.5px;font-weight:600;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .user-chip .u-role{font-size:10px;color:var(--text-faint)}
  .btn-logout{margin-top:8px;width:100%;background:none;border:1px solid var(--border-strong);color:var(--text-dim);
    border-radius:9px;padding:8px;font-size:12px;font-weight:600}
  .btn-logout:hover{color:var(--text);border-color:var(--red)}

  .main{overflow-y:auto;height:100vh}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 28px;border-bottom:1px solid var(--border);
    position:sticky;top:0;background:rgba(10,13,12,.86);backdrop-filter:blur(10px);z-index:10}
  .topbar .crumb{font-size:11px;color:var(--text-faint);letter-spacing:.4px;font-weight:600}
  .topbar h1{font-size:19px;font-weight:700;letter-spacing:-.3px;margin-top:2px}
  .live{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text-dim);font-weight:600}
  .live .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(46,229,157,.18)}
  .content{padding:26px 28px 60px}

  /* KPIs */
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:17px 18px}
  .kpi .k-label{font-size:11px;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .kpi .k-val{font-size:27px;font-weight:800;letter-spacing:-1px;margin-top:7px}
  .kpi .k-sub{font-size:11.5px;color:var(--text-faint);margin-top:3px}

  .sec-title{font-size:12px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.8px;
    margin:6px 0 14px;display:flex;align-items:center;gap:12px}
  .sec-title .rule{flex:1;height:1px;background:var(--border)}

  /* radar bars */
  .radar-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
  .rcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden}
  .rcard .rc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .rcard .rc-name{font-size:13px;font-weight:700}
  .rcard .rc-val{font-size:32px;font-weight:800;letter-spacing:-1.5px}
  .rcard .rc-pct{font-size:12px;color:var(--text-faint);font-weight:600;margin-top:2px}
  .rcard .rc-bar{height:6px;border-radius:4px;background:var(--bg);margin-top:14px;overflow:hidden}
  .rcard .rc-fill{height:100%;border-radius:4px}
  .tag{font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px}
  .t-green{background:var(--green-deep);color:var(--green)}
  .t-amber{background:var(--amber-deep);color:#ffcf7a}
  .t-red{background:var(--red-deep);color:#ff9aa6}

  .health-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
  /* distribuição empilhada */
  .stack{display:flex;height:20px;border-radius:7px;overflow:hidden;margin-bottom:12px;background:var(--bg)}
  .stack>div{height:100%;transition:width .5s}
  .stack-legend{display:flex;gap:20px;flex-wrap:wrap;font-size:12px;color:var(--text-dim);font-weight:600}
  .stack-legend .lg{display:flex;align-items:center;gap:7px}
  .stack-legend .sw{width:10px;height:10px;border-radius:3px}
  .stack-cap{font-size:12px;color:var(--text-faint);margin-top:12px}
  .stack-cap b{color:var(--green);font-weight:700}
  /* grid inferior: fila + aniversariantes */
  .radar-lower{display:grid;grid-template-columns:1.7fr 1fr;gap:16px;margin-top:8px}
  .aniv-list{display:flex;flex-direction:column}
  .aniv-item{display:flex;align-items:center;gap:11px;padding:11px 16px;border-bottom:1px solid var(--border);cursor:pointer}
  .aniv-item:last-child{border-bottom:none}
  .aniv-item:hover{background:var(--surface-2)}
  .aniv-item .cake{width:30px;height:30px;border-radius:8px;background:var(--purple);display:grid;place-items:center;flex-shrink:0}
  .aniv-item .an{font-size:13px;font-weight:600}
  .aniv-item .ab{font-size:11px;color:var(--text-faint)}
  .note{font-size:12px;color:var(--text-dim);background:var(--surface);border:1px solid var(--border);
    border-left:3px solid var(--amber);border-radius:8px;padding:11px 14px;margin-top:6px;line-height:1.5}
  @media(max-width:860px){.radar-lower{grid-template-columns:1fr}}
  .hpill{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:12px 16px;flex:1;min-width:140px}
  .hpill .hp-n{font-size:20px;font-weight:800}
  .hpill .hp-l{font-size:11px;color:var(--text-dim);font-weight:600;margin-top:2px}

  /* tables */
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
  .toolbar{display:flex;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border);align-items:center}
  .search{flex:1;background:var(--bg);border:1px solid var(--border-strong);border-radius:9px;padding:9px 13px;
    color:var(--text);font-size:13px;font-family:inherit}
  .search:focus{outline:none;border-color:var(--green)}
  table{width:100%;border-collapse:collapse}
  th{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-faint);font-weight:700;
    text-align:left;padding:11px 16px;border-bottom:1px solid var(--border);background:var(--bg-2)}
  td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px}
  tbody tr{cursor:pointer}
  tbody tr:hover{background:var(--surface-2)}
  tbody tr:last-child td{border-bottom:none}
  .cell-name{display:flex;align-items:center;gap:10px;font-weight:600}

  if(!d) return "—";
  const dias = Math.floor((Date.now()-new Date(d+"T00:00:00"))/86400000);

  if(dias<60) return `há ${dias} dias`;

}

});

}

  // linha do tempo de faixas (últimos 3 meses)

  const mapa={}; (tl||[]).forEach(r=>{ mapa[String(r.mes).slice(0,7)]=r; });
  const hoje=new Date(); const meses=[];
  for(let i=2;i>=0;i--){ const d=new Date(hoje.getFullYear(),hoje.getMonth()-i,1);
    const chave=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    const nome=d.toLocaleDateString("pt-BR",{month:"short"}).replace(".","");

  const timeline = meses.map(m=>`<div class="tl-mes"><div class="m">${m.nome}</div>${faixaBadge(m.faixa,m.grau)}<div class="ct">${m.ct>0?nf(m.ct)+" ct":"—"}</div></div>`).join("");

  el("drBody").innerHTML=`

      <div class="dr-stat"><div class="l">Nº de operações</div><div class="v" style="font-size:14px">${s?nf(s.qtd_operacoes):"—"}</div></div>
      <div class="dr-stat"><div class="l">Situação</div><div class="v" style="font-size:14px">${s?(OP_LABEL[s.status_operacao]||"—"):"—"}</div></div>
      <div class="dr-stat"><div class="l">Última operação</div><div class="v" style="font-size:14px">${s?fmtData(s.data_ultima_operacao):"—"}</div></div>
      <div class="dr-stat"><div class="l">1ª operação</div><div class="v" style="font-size:14px">${s?fmtData(s.data_ativacao):"—"}</div></div>
      <div class="dr-stat"><div class="l">Cadastro</div><div class="v" style="font-size:14px">${fmtData(c.data_cadastro)}</div></div>
    </div>
    <div class="dr-sec">Evolução de faixa · últimos 3 meses</div>
    <div class="timeline">${timeline}</div>
    <div class="dr-sec">Contato</div>
    <div class="dr-stats">
      <div class="dr-stat"><div class="l">Telefone</div><div class="v" style="font-size:13px">${c.telefone||"—"}</div></div>
      <div class="dr-stat"><div class="l">E-mail</div><div class="v" style="font-size:12px;word-break:break-all">${c.email||"—"}</div></div>
      <div class="dr-stat"><div class="l">Aniversário</div><div class="v" style="font-size:14px">${aniv}</div></div>
    </div>`;
}
function fecharFicha(){ el("overlay").classList.remove("open"); el("drawer").classList.remove("open"); }
el("drClose").addEventListener("click",fecharFicha);
el("overlay").addEventListener("click",fecharFicha);
document.addEventListener("keydown",e=>{ if(e.key==="Escape") fecharFicha(); });
el("menuBtn").addEventListener("click",()=>el("sidebar").classList.toggle("open"));

// ---------- erro ----------
function erro(e,alvo){
  const html=`<div class="empty">Não foi possível carregar os dados.<br><span style="font-size:11px;color:var(--text-faint)">${(e.message||e).toString()}</span><br><br>Se você acabou de criar seu acesso, confira se rodou o passo que vincula seu login como administrador.</div>`;
  el(alvo||"content").innerHTML=html;
}

boot();
</script>
</body>
</html>
